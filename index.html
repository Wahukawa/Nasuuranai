<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>茄子を占う</title>
  <meta name="description" content="買うか買わないか、茄子が決める" />
  <meta property="og:title" content="茄子を占う" />
  <meta property="og:description" content="買うか買わないか、茄子が決める" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a14;
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
    }

    .app {
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 0%, #1a1040 0%, #0a0a14 60%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow: hidden;
    }

    .title {
      font-size: clamp(13px, 3.5vw, 18px);
      color: #9f7aea;
      letter-spacing: 0.3em;
      margin-bottom: 4px;
      opacity: 0.8;
    }

    .subtitle {
      font-size: clamp(28px, 8vw, 52px);
      font-weight: 900;
      color: #e9d8fd;
      letter-spacing: 0.05em;
      margin-bottom: 40px;
      text-shadow: 0 0 30px #6b46c133;
    }

    .stage {
      width: min(420px, 92vw);
      min-height: 200px;
      border: 1px solid #2d2060;
      border-radius: 20px;
      background: #100d22;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      position: relative;
      margin-bottom: 28px;
      overflow: hidden;
      transition: box-shadow 0.4s, border-color 0.4s;
    }

    .stage.buy {
      box-shadow: 0 0 40px var(--glow, #ed893633);
      border-color: var(--glow, #ed8936);
    }

    .stage.nobuy {
      box-shadow: 0 0 20px #4a556855;
      border-color: #4a5568;
    }

    .stage.special {
      animation: specialPulse 0.8s ease-out 3;
    }

    @keyframes specialPulse {
      0%, 100% { box-shadow: 0 0 40px #f6e05e66; }
      50% { box-shadow: 0 0 80px #f6e05e, 0 0 120px #ed893666; }
    }

    .stage.evil {
      animation: evilPulse 0.6s ease-out 4;
      border-color: #ff1a1a !important;
      background: #1a0000;
    }

    @keyframes evilPulse {
      0%, 100% { box-shadow: 0 0 20px #ff1a1a44; }
      50% { box-shadow: 0 0 60px #ff1a1a, 0 0 100px #7b000088; }
    }

    .evil-overlay {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 8px, #ff1a1a08 8px, #ff1a1a08 9px);
      pointer-events: none;
      border-radius: 20px;
      animation: scanline 3s linear infinite;
    }

    @keyframes scanline {
      0% { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    .idle-text {
      font-size: 48px;
      opacity: 0.15;
      user-select: none;
    }

    .spinning-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #2d2060;
      border-top-color: #9f7aea;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spinning-label {
      font-size: 14px;
      color: #9f7aea;
      letter-spacing: 0.2em;
    }

    .result-emoji {
      font-size: 52px;
      margin-bottom: 12px;
      animation: popIn 0.4s cubic-bezier(.17,.67,.38,1.35) both;
    }

    .result-label {
      font-size: clamp(18px, 5vw, 28px);
      font-weight: 900;
      text-align: center;
      white-space: pre-line;
      line-height: 1.4;
      color: #fff;
      animation: popIn 0.4s 0.1s cubic-bezier(.17,.67,.38,1.35) both;
    }

    .result-label.evil-text {
      color: #ff4444;
      text-shadow: 0 0 10px #ff0000, 0 0 30px #7b0000;
      animation: evilFlicker 0.15s steps(1) infinite, popIn 0.4s 0.1s cubic-bezier(.17,.67,.38,1.35) both;
    }

    @keyframes evilFlicker {
      0%, 90% { opacity: 1; }
      95% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .result-msg {
      margin-top: 10px;
      font-size: 13px;
      letter-spacing: 0.15em;
      opacity: 0.6;
      color: #e9d8fd;
      animation: fadeUp 0.4s 0.25s ease both;
    }

    .result-badge {
      margin-top: 14px;
      padding: 4px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      animation: fadeUp 0.4s 0.3s ease both;
    }

    .badge-buy { background: #276749; color: #9ae6b4; }
    .badge-nobuy { background: #2d3748; color: #a0aec0; }
    .badge-evil { background: #7b0000; color: #ff8080; border: 1px solid #ff1a1a44; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .shake { animation: shakeIt 0.5s ease; }

    @keyframes shakeIt {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-8px); }
      30% { transform: translateX(8px); }
      45% { transform: translateX(-6px); }
      60% { transform: translateX(6px); }
      75% { transform: translateX(-3px); }
      90% { transform: translateX(3px); }
    }

    .btn {
      width: min(420px, 92vw);
      padding: 18px;
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 900;
      font-family: inherit;
      letter-spacing: 0.2em;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: linear-gradient(135deg, #6b46c1, #553c9a);
      color: #e9d8fd;
      box-shadow: 0 4px 24px #6b46c155;
      transition: all 0.15s;
      margin-bottom: 28px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
    }

    .btn:active { transform: translateY(1px); box-shadow: 0 2px 8px #6b46c155; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-retry {
      width: min(420px, 92vw);
      padding: 12px;
      font-size: clamp(14px, 4vw, 18px);
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.15em;
      border: 1px solid #553c9a;
      border-radius: 14px;
      cursor: pointer;
      background: transparent;
      color: #9f7aea;
      transition: all 0.15s;
      margin-bottom: 16px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
    }

    .btn-retry:active { transform: translateY(1px); }

    .history-label {
      font-size: 11px;
      letter-spacing: 0.25em;
      color: #553c9a;
      margin-bottom: 10px;
      text-transform: uppercase;
      text-align: center;
    }

    .history-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .history-chip {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
      animation: particleFly 1.2s ease-out forwards;
    }

    @keyframes particleFly {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    #history-section { display: none; text-align: center; }
    #btn-retry { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">破産機材部</div>
    <div class="subtitle">茄子を占う</div>

    <div class="stage" id="stage">
      <div class="idle-text" id="idle">🍆</div>
      <div class="spinning-wrap" id="spinning" style="display:none">
        <div class="spinner"></div>
        <div class="spinning-label">占い中…</div>
      </div>
      <div id="result-content" style="display:none; flex-direction:column; align-items:center;">
        <div class="result-emoji" id="result-emoji"></div>
        <div class="result-label" id="result-label"></div>
        <div class="result-msg" id="result-msg"></div>
        <div class="result-badge" id="result-badge"></div>
      </div>
    </div>

    <button class="btn" id="btn-spin">🍆 茄子を占う</button>
    <button class="btn-retry" id="btn-retry">🔄 もう一度占う</button>

    <div id="history-section">
      <div class="history-label">最近の結果</div>
      <div class="history-row" id="history-row"></div>
    </div>
  </div>

  <script>
    const RESULTS = [
      { label: '非茄子…', prob: 0.05, buy: false, glow: '#718096', emoji: '😞', message: '今日じゃない…が明日は…' },
      { label: 'ボキ崎がマウントをとってきた！\n避難のため非茄子…', prob: 0.05, buy: false, glow: '#ff1a1a', emoji: '😈', message: 'ボ○キアラート発令！総員待避せよ！！', evil: true },
      { label: '祝福茄子！！！', prob: 0.10, buy: true, glow: '#f6e05e', emoji: '🍆✨', message: '一竿二アンプ三茄子', special: true },
      { label: '茄子！！', prob: 0.16, buy: true, glow: '#ed8936', emoji: '🍆', message: 'may the nace be with you.' },
      { label: 'カウシカ', prob: 0.16, buy: true, glow: '#48bb78', emoji: '◂Ⓘ▸', message: '買って。/カウシカ' },
      { label: '回収してから考える', prob: 0.16, buy: true, glow: '#63b3ed', emoji: '💸', message: '考えるだけ時間の無駄' },
      { label: '汝、破産のハサンなり', prob: 0.16, buy: true, glow: '#b794f4', emoji: '💀', message: '最速購入（ザバーニーヤ）' },
      { label: 'なすですな', prob: 0.16, buy: true, glow: '#d6bcfa', emoji: '😇', message: 'なすですな' },
    ];

    function pick() {
      const r = Math.random();
      let acc = 0;
      for (const item of RESULTS) {
        acc += item.prob;
        if (r < acc) return item;
      }
      return RESULTS[RESULTS.length - 1];
    }

    const stage = document.getElementById('stage');
    const idle = document.getElementById('idle');
    const spinningEl = document.getElementById('spinning');
    const resultContent = document.getElementById('result-content');
    const resultEmoji = document.getElementById('result-emoji');
    const resultLabel = document.getElementById('result-label');
    const resultMsg = document.getElementById('result-msg');
    const resultBadge = document.getElementById('result-badge');
    const btnSpin = document.getElementById('btn-spin');
    const btnRetry = document.getElementById('btn-retry');
    const historySection = document.getElementById('history-section');
    const historyRow = document.getElementById('history-row');

    let spinning = false;
    let history = [];

    function showResult(r) {
      idle.style.display = 'none';
      spinningEl.style.display = 'none';
      resultContent.style.display = 'flex';

      resultEmoji.textContent = r.emoji;
      resultLabel.textContent = r.label;
      resultLabel.className = 'result-label' + (r.evil ? ' evil-text' : '');
      resultMsg.textContent = r.message;

      stage.style.setProperty('--glow', r.glow);
      stage.className = 'stage ' + (r.buy ? 'buy' : 'nobuy') + (r.special ? ' special' : '') + (r.evil ? ' evil' : '');

      if (r.buy) {
        resultBadge.className = 'result-badge badge-buy';
        resultBadge.textContent = '✅ 茄子（買え）';
      } else if (r.evil) {
        resultBadge.className = 'result-badge badge-evil';
        resultBadge.textContent = '☠️ 大外れ（ボキ崎）';
      } else {
        resultBadge.className = 'result-badge badge-nobuy';
        resultBadge.textContent = '❌ 非茄子（やめとけ）';
      }

      if (r.evil) {
        const overlay = document.createElement('div');
        overlay.className = 'evil-overlay';
        overlay.id = 'evil-overlay';
        stage.appendChild(overlay);
      }

      if (r.special || r.evil) {
        const colors = r.special
          ? ['#f6e05e','#ed8936','#f6ad55','#fff','#b7791f']
          : ['#ff1a1a','#7b0000','#ff4444','#330000'];
        const count = r.special ? 40 : 24;
        for (let i = 0; i < count; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          const angle = (i / count) * Math.PI * 2;
          const speed = (r.special ? 60 : 40) + Math.random() * 80;
          p.style.left = '50%';
          p.style.top = '50%';
          p.style.backgroundColor = colors[i % colors.length];
          p.style.setProperty('--dx', Math.cos(angle) * speed + 'px');
          p.style.setProperty('--dy', Math.sin(angle) * speed + 'px');
          stage.appendChild(p);
          (function(particle){
            setTimeout(function(){ particle.remove(); }, 1400);
          })(p);
        }
      }

      if (!r.buy) {
        stage.classList.add('shake');
        setTimeout(function(){ stage.classList.remove('shake'); }, 600);
      }

      btnRetry.style.display = 'block';
      updateHistory(r);
    }

    function updateHistory(r) {
      history = [r].concat(history).slice(0, 5);
      historySection.style.display = 'block';
      historyRow.innerHTML = '';
      history.forEach(function(h) {
        const chip = document.createElement('div');
        chip.className = 'history-chip';
        chip.style.background = h.buy ? '#276749' : '#2d3748';
        chip.style.color = h.buy ? '#9ae6b4' : '#a0aec0';
        chip.textContent = h.emoji + ' ' + h.label.split('\n')[0].slice(0, 8) + '…';
        historyRow.appendChild(chip);
      });
    }

    function doSpin() {
      if (spinning) return;
      spinning = true;
      btnSpin.disabled = true;
      btnRetry.style.display = 'none';

      const oldOverlay = document.getElementById('evil-overlay');
      if (oldOverlay) oldOverlay.remove();

      idle.style.display = 'none';
      resultContent.style.display = 'none';
      spinningEl.style.display = 'flex';
      stage.className = 'stage';

      const start = Date.now();
      function check() {
        if (Date.now() - start >= 1000) {
          const r = pick();
          showResult(r);
          spinning = false;
          btnSpin.disabled = false;
        } else {
          requestAnimationFrame(check);
        }
      }
      requestAnimationFrame(check);
    }

    function doReset() {
      const oldOverlay = document.getElementById('evil-overlay');
      if (oldOverlay) oldOverlay.remove();
      resultContent.style.display = 'none';
      spinningEl.style.display = 'none';
      idle.style.display = 'block';
      stage.className = 'stage';
      btnRetry.style.display = 'none';
    }

    btnSpin.addEventListener('click', doSpin);
    btnRetry.addEventListener('click', doReset);
  </script>
</body>
</html>
